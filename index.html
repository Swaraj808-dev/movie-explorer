<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="login-page">
        <div class="login-card">
            <h1>Welcome to <span>MoodFlix</span></h1>

            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button id="login-btn">Login</button>

            <p>Not part of MoodFlix ? <span id="toggle-link">Create Account</span></p>
        </div>
    </div>

    <div id="home-page" class="hidden">
        <h1 id="welcome-text"></h1>
        <h2 id="mood-question" class="hidden">What's your mood today?</h2>

        <div id="mood-container" class="hidden">
        <button data-mood="happy">😄 Happy</button>
        <button data-mood="romantic">❤️ Romantic</button>
        <button data-mood="action">🔥 Action</button>
        <button data-mood="horror">👻 Horror</button>
        <button data-mood="sad">😢 Sad</button>
        <button data-mood="thriller">🕵️ Thriller</button>
        <button data-mood="chill">🌿 Chill</button>
        <button data-mood="adventure">🏔️ Adventure</button>
        <button data-mood="sci-fi">🚀 Sci-Fi</button>
        <button data-mood="family">👨‍👩‍👧 Family</button>
        </div>

    <div id="movie-container"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
