<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Explorer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="login-container">
        <div class="login-card">

            <h1 id="title">SIGN IN</h1>

            <input type="text" id="username" placeholder="Username">
            <input type="password" id="password" placeholder="Password">

            <button id="submit-btn">Sign In</button>

            <p id="toggle-text">
                Not a member? <span id="toggle-link">Sign up</span>
            </p>

        </div>
    </div>

    <div id="app" class="hidden">
        <header>
            <h1>🎬 Movie Explorer</h1>
            <input type="text" id="search" placeholder="Search movies...">
        </header>

        <div id="moods">
            <button data-mood="happy">😄</button>
            <button data-mood="romantic">❤️</button>
            <button data-mood="dark">😈</button>
            <button data-mood="scary">👻</button>
            <button data-mood="action">🔥</button>
            <button data-mood="chill">😌</button>
            <button data-mood="sad">😢</button>
            <button data-mood="sciFi">🚀</button>
        </div>

        <main id="movie-container"></main>
    </div>

    <div id="popup" class="popup hidden">
        <p id="greeting"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
